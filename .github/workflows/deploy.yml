name: Deploy Databricks Apps

on:
  push:
    branches:
      - staging
      - prod
  workflow_dispatch:
    inputs:
      target:
        description: Bundle target and GitHub environment to deploy.
        required: true
        type: choice
        options:
          - staging
          - prod
      git_ref:
        description: Branch, tag, or SHA to deploy. Defaults to the selected target branch.
        required: false
        default: ""
        type: string
      app_path:
        description: Deploy only this app folder (leave blank to deploy all apps).
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  prepare:
    name: Select apps to deploy
    runs-on: ubuntu-latest
    outputs:
      deploy_matrix: ${{ steps.set-matrix.outputs.deploy_matrix }}
      target: ${{ steps.set-matrix.outputs.target }}
      git_ref: ${{ steps.set-matrix.outputs.git_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            dummy_app_1:
              - 'dummy_app_1/**'
            dummy_app_2:
              - 'dummy_app_2/**'
            shared:
              - '.github/**'

      - id: set-matrix
        env:
          FILTER_APP_1: ${{ steps.filter.outputs.dummy_app_1 }}
          FILTER_APP_2: ${{ steps.filter.outputs.dummy_app_2 }}
          FILTER_SHARED: ${{ steps.filter.outputs.shared }}
          INPUT_APP_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.app_path || '' }}
        run: |
          TARGET="${{ github.event_name == 'workflow_dispatch' && inputs.target || github.ref_name }}"
          GIT_REF="${{ github.event_name == 'workflow_dispatch' && inputs.git_ref != '' && inputs.git_ref || (github.event_name == 'workflow_dispatch' && inputs.target || github.ref_name) }}"

          should_deploy() {
            local app_path="$1"
            if [ "${INPUT_APP_PATH}" != "" ] && [ "${INPUT_APP_PATH}" != "${app_path}" ]; then
              return 1
            fi
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              return 0
            fi
            if [ "${FILTER_SHARED}" = "true" ]; then
              return 0
            fi
            case "${app_path}" in
              dummy_app_1) [ "${FILTER_APP_1}" = "true" ] ;;
              dummy_app_2) [ "${FILTER_APP_2}" = "true" ] ;;
              *) return 1 ;;
            esac
          }

          MATRIX="[]"
          if should_deploy dummy_app_1; then
            MATRIX=$(echo "${MATRIX}" | jq -c '. + [{
              "app_path": "dummy_app_1",
              "app_id": "1",
              "bundle_resource_key": "dummy_app",
              "app_url": "${{ vars.DUMMY_APP_1_URL }}"
            }]')
          fi
          if should_deploy dummy_app_2; then
            MATRIX=$(echo "${MATRIX}" | jq -c '. + [{
              "app_path": "dummy_app_2",
              "app_id": "2",
              "bundle_resource_key": "dummy_app",
              "app_url": "${{ vars.DUMMY_APP_2_URL }}"
            }]')
          fi

          echo "deploy_matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"
          echo "target=${TARGET}" >> "${GITHUB_OUTPUT}"
          echo "git_ref=${GIT_REF}" >> "${GITHUB_OUTPUT}"

  deploy:
    name: Deploy ${{ matrix.app_path }}
    needs: prepare
    if: needs.prepare.outputs.deploy_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.deploy_matrix) }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_path: ${{ matrix.app_path }}
      github_environment: ${{ needs.prepare.outputs.target }}
      target: ${{ needs.prepare.outputs.target }}
      bundle_resource_key: ${{ matrix.bundle_resource_key }}
      app_name: dummy-app-${{ matrix.app_id }}-${{ needs.prepare.outputs.target }}
      app_url: ${{ matrix.app_url }}
      git_ref: ${{ needs.prepare.outputs.git_ref }}
    secrets:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      GH_PAT: ${{ secrets.GH_PAT }}
