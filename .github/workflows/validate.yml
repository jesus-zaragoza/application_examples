name: Validate Databricks App Bundles

on:
  pull_request:
    branches:
      - staging
      - prod
    paths:
      - "dummy_app_1/**"
      - "dummy_app_2/**"
      - ".github/**"
  workflow_dispatch:
    inputs:
      app_path:
        description: Validate only this app folder (leave blank to validate all apps).
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  prepare:
    name: Select apps to validate
    runs-on: ubuntu-latest
    outputs:
      app_matrix: ${{ steps.set-matrix.outputs.app_matrix }}
      validate_prod: ${{ steps.set-matrix.outputs.validate_prod }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            dummy_app_1:
              - 'dummy_app_1/**'
            dummy_app_2:
              - 'dummy_app_2/**'
            shared:
              - '.github/**'

      - id: set-matrix
        env:
          FILTER_APP_1: ${{ steps.filter.outputs.dummy_app_1 }}
          FILTER_APP_2: ${{ steps.filter.outputs.dummy_app_2 }}
          FILTER_SHARED: ${{ steps.filter.outputs.shared }}
          INPUT_APP_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.app_path || '' }}
        run: |
          should_validate() {
            local app_path="$1"
            if [ "${INPUT_APP_PATH}" != "" ] && [ "${INPUT_APP_PATH}" != "${app_path}" ]; then
              return 1
            fi
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              return 0
            fi
            if [ "${FILTER_SHARED}" = "true" ]; then
              return 0
            fi
            case "${app_path}" in
              dummy_app_1) [ "${FILTER_APP_1}" = "true" ] ;;
              dummy_app_2) [ "${FILTER_APP_2}" = "true" ] ;;
              *) return 1 ;;
            esac
          }

          MATRIX="[]"
          if should_validate dummy_app_1; then
            MATRIX=$(echo "${MATRIX}" | jq -c '. + [{"app_path":"dummy_app_1"}]')
          fi
          if should_validate dummy_app_2; then
            MATRIX=$(echo "${MATRIX}" | jq -c '. + [{"app_path":"dummy_app_2"}]')
          fi

          VALIDATE_PROD="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.base_ref }}" = "prod" ]; then
            VALIDATE_PROD="true"
          fi

          echo "app_matrix=${MATRIX}" >> "${GITHUB_OUTPUT}"
          echo "validate_prod=${VALIDATE_PROD}" >> "${GITHUB_OUTPUT}"

  python-quality:
    name: Lint and test ${{ matrix.app_path }}
    needs: prepare
    if: needs.prepare.outputs.app_matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.app_matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.app_path }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Check formatting
        run: ruff format --check .

      - name: Run lint rules
        run: ruff check .

      - name: Run unit tests
        run: pytest tests/unit -q

  bundle-validate-staging:
    name: Validate ${{ matrix.app_path }} (staging)
    needs: [prepare, python-quality]
    if: >-
      needs.prepare.outputs.app_matrix != '[]' &&
      needs.python-quality.result != 'failure' &&
      needs.python-quality.result != 'cancelled'
    runs-on: ubuntu-latest
    environment: staging
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.app_matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.app_path }}
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: databricks/setup-cli@main

      - name: Validate staging bundle
        run: |
          databricks bundle validate -t staging \
            --var "app_version=validation" \
            --var "git_branch=${{ github.head_ref || github.ref_name }}"

  bundle-validate-prod:
    name: Validate ${{ matrix.app_path }} (prod)
    needs: [prepare, python-quality]
    if: >-
      needs.prepare.outputs.app_matrix != '[]' &&
      needs.prepare.outputs.validate_prod == 'true' &&
      needs.python-quality.result != 'failure' &&
      needs.python-quality.result != 'cancelled'
    runs-on: ubuntu-latest
    environment: prod
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.app_matrix) }}
    defaults:
      run:
        working-directory: ${{ matrix.app_path }}
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: databricks/setup-cli@main

      - name: Validate prod bundle
        run: |
          databricks bundle validate -t prod \
            --var "app_version=validation" \
            --var "git_branch=${{ github.head_ref || github.ref_name }}"
